name: CartCast Weekly Data Update

on:
  schedule:
    # Every Monday at 9 AM EST (2 PM UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Fetch fresh price data
        env:
          BLS_API_KEY:       ${{ secrets.BLS_API_KEY }}
          USDA_API_KEY:      ${{ secrets.USDA_API_KEY }}
          FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY:       ${{ secrets.EIA_API_KEY }}
          OPENFDA_API_KEY:   ${{ secrets.OPENFDA_API_KEY }}
          HUD_API_KEY:       ${{ secrets.HUD_API_KEY }}
          CENSUS_API_KEY:    ${{ secrets.CENSUS_API_KEY }}
          RENTCAST_API_KEY:  ${{ secrets.RENTCAST_API_KEY }}
        run: python fetch_data.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "cartcast-bot@github-actions.io"
          git config --local user.name "CartCast Data Bot"
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Auto-update: price data $(date +'%Y-%m-%d')"
          git push
