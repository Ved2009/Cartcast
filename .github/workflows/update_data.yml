# CartCast — Weekly Price Update
# Runs every Monday at 9am UTC + can be triggered manually
# Go to GitHub → Actions → "Update Prices" → Run workflow

name: Update Prices

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday 9am UTC
  workflow_dispatch:        # Manual trigger button in GitHub Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to push data.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run data pipeline
        env:
          BLS_API_KEY:  ${{ secrets.BLS_API_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_data.py

      - name: Commit and push updated data.json
        run: |
          git config user.name  "CartCast Bot"
          git config user.email "bot@cartcast.app"
          git add data.json
          git diff --staged --quiet || git commit -m "Weekly price update — $(date '+%b %d %Y')"
          git push
